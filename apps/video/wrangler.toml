name = "aevia-video"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# KV namespace for anonymous sessions + live metadata.
# Populate `id` after running `wrangler kv namespace create AEVIA_SESSIONS`.
# [[kv_namespaces]]
# binding = "AEVIA_SESSIONS"
# id = ""
# preview_id = ""

# KV namespace for the gas-sponsored registration relayer — tracks
# per-owner free-registration counts. Created 2026-04-17.
[[kv_namespaces]]
binding = "AEVIA_RELAYER_COUNTS"
id = "73fdbcc0fd124be7a5b0e3487ac55cb3"
preview_id = "c1d3da26fc844247b16079bc93d88745"

[vars]
NEXT_PUBLIC_APP_URL = "https://aevia.video"
NEXT_PUBLIC_APP_ENV = "production"

# Secrets go via `wrangler pages secret put <NAME>` — never in this file.
# Required secrets (Sprint 1):
#   STREAM_API_TOKEN
#   STREAM_WEBHOOK_SECRET
#   SESSION_SIGNING_KEY
#   PRIVY_APP_SECRET
