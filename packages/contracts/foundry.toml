[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
broadcast = "broadcast"
cache_path = "cache"
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read-write", path = "./"}]
fuzz = { runs = 256 }
invariant = { runs = 32, depth = 64, fail_on_revert = false }

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 128, fail_on_revert = false }
verbosity = 3

[profile.fork]
eth_rpc_url = "${BASE_SEPOLIA_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet = "${BASE_MAINNET_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
